kind = "web"
previewPath = "/"
title = "PROMATCH"
version = "1.0.0"
id = "artifacts/promatch"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21362

[services.development]
run = "pnpm --filter @workspace/promatch run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/promatch", "run", "build" ]
publicDir = "artifacts/promatch/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21362"
BASE_PATH = "/"
