openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: PROMATCH API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: session
  - name: portfolio
  - name: topics
  - name: recommendations
  - name: calls
  - name: teams
  - name: projects
  - name: tasks
  - name: knowledge
  - name: notifications
  - name: admin
  - name: analytics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /session/login:
    post:
      operationId: login
      tags: [session]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Logged in user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /session/logout:
    post:
      operationId: logout
      tags: [session]
      summary: Log out current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }

  /session/me:
    get:
      operationId: getSession
      tags: [session]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      operationId: switchRole
      tags: [session]
      summary: Switch active demo role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  $ref: "#/components/schemas/UserRole"
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateProfile
      tags: [session]
      summary: Update current user profile (name, avatarUrl)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                avatarUrl:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /session/password:
    patch:
      operationId: changePassword
      tags: [session]
      summary: Change current user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword: { type: string }
                newPassword: { type: string }
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated or wrong current password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /users:
    post:
      operationId: registerUser
      tags: [session]
      summary: Register a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, role]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string }
                role:
                  $ref: "#/components/schemas/UserRole"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /skills:
    get:
      operationId: listSkills
      tags: [portfolio]
      summary: List predefined skills (categories)
      responses:
        "200":
          description: Skills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Skill"

  /portfolios/{userId}:
    get:
      operationId: getPortfolio
      tags: [portfolio]
      summary: Get a student's digital portfolio
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Portfolio
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Portfolio"
    put:
      operationId: updatePortfolio
      tags: [portfolio]
      summary: Update portfolio (skills, interests, bio)
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Portfolio"

  /topics:
    get:
      operationId: listTopics
      tags: [topics]
      summary: Search and filter topics
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: domain
          in: query
          schema: { type: string }
        - name: difficulty
          in: query
          schema: { type: string }
        - name: source
          in: query
          schema: { type: string }
        - name: sort
          in: query
          schema: { type: string, enum: [relevance, recent, popular, score] }
      responses:
        "200":
          description: Topic list
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Topic"
                  total: { type: integer }
    post:
      operationId: createTopic
      tags: [topics]
      summary: Submit a topic proposal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopicCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Topic"

  /topics/{topicId}:
    get:
      operationId: getTopic
      tags: [topics]
      parameters:
        - name: topicId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Topic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Topic"

  /topics/recommend:
    get:
      operationId: recommendTopics
      tags: [recommendations]
      summary: Personalized topic recommendations (Hybrid Score)
      parameters:
        - name: domain
          in: query
          schema: { type: string }
        - name: difficulty
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Ranked recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopicRecommendation"

  /topics/ai-generate:
    post:
      operationId: aiGenerateTopics
      tags: [recommendations]
      summary: Generate personalized topics with AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                interests:
                  type: array
                  items: { type: string }
                domain: { type: string }
      responses:
        "200":
          description: AI topics
          content:
            application/json:
              schema:
                type: object
                required: [items, remainingQuota]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Topic"
                  remainingQuota: { type: integer }

  /topic-trends:
    get:
      operationId: getTopicTrends
      tags: [topics]
      summary: Trending topics from external market sources
      responses:
        "200":
          description: Trends
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendItem"

  /calls:
    get:
      operationId: listCalls
      tags: [calls]
      summary: Marketplace - list call for projects
      parameters:
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Calls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CallForProject"
    post:
      operationId: createCall
      tags: [calls]
      summary: Enterprise creates a call for project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CallCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallForProject"

  /calls/{callId}:
    get:
      operationId: getCall
      tags: [calls]
      parameters:
        - name: callId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Call
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallForProject"

  /calls/{callId}/apply:
    post:
      operationId: applyToCall
      tags: [calls]
      parameters:
        - name: callId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message: { type: string }
      responses:
        "200":
          description: Applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallApplication"

  /teams/recommend:
    get:
      operationId: recommendTeammates
      tags: [teams]
      summary: Recommend teammates by skill complementarity
      parameters:
        - name: topicId
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Teammate recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeammateRecommendation"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List projects accessible to current user
      responses:
        "200":
          description: Projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create project workspace from a topic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"

  /projects/{projectId}/tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{taskId}:
    put:
      operationId: updateTask
      tags: [tasks]
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /projects/{projectId}/contributions:
    get:
      operationId: getContributions
      tags: [projects]
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Member contributions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContributionMetric"

  /instructor/dashboard:
    get:
      operationId: getInstructorDashboard
      tags: [projects]
      summary: Instructor dashboard summary
      responses:
        "200":
          description: Dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstructorDashboard"

  /knowledge:
    get:
      operationId: listKnowledge
      tags: [knowledge]
      summary: Browse knowledge repository
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: domain
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Archived projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArchivedProject"

  /knowledge/{archiveId}:
    get:
      operationId: getKnowledge
      tags: [knowledge]
      parameters:
        - name: archiveId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Archive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchivedProject"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{notificationId}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      parameters:
        - name: notificationId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [count]
                properties:
                  count: { type: integer }

  /teams/invite:
    post:
      operationId: sendTeamInvitation
      tags: [notifications]
      summary: Send a team invitation that creates a push notification for the invitee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamInvitation"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /tasks/{taskId}/attachments:
    get:
      operationId: listTaskAttachments
      tags: [tasks]
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: List of attachments for the task
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskAttachment"
    post:
      operationId: uploadTaskAttachment
      tags: [tasks]
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Attachment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskAttachment"

  /tasks/{taskId}/attachments/{attachmentId}:
    delete:
      operationId: deleteTaskAttachment
      tags: [tasks]
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: string }
        - name: attachmentId
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /tasks/{taskId}/attachments/{attachmentId}/download:
    get:
      operationId: downloadTaskAttachment
      tags: [tasks]
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: string }
        - name: attachmentId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: File download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /projects/{projectId}/status:
    put:
      operationId: updateProjectStatus
      tags: [projects]
      summary: Update project status; emits a push notification for members
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Admin dashboard statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      parameters:
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /admin/users/{userId}/status:
    put:
      operationId: updateUserStatus
      tags: [admin]
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [active, suspended, pending] }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/moderation:
    get:
      operationId: listModeration
      tags: [admin]
      summary: Pending content moderation queue
      responses:
        "200":
          description: Reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModerationItem"

  /admin/moderation/{reportId}:
    put:
      operationId: resolveModeration
      tags: [admin]
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { type: string, enum: [approve, hide, delete] }
                note: { type: string }
      responses:
        "200":
          description: Resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModerationItem"

  /analytics/overview:
    get:
      operationId: getAnalyticsOverview
      tags: [analytics]
      summary: Trending domains, skills, and project outcomes
      responses:
        "200":
          description: Analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsOverview"

  /users/search:
    get:
      operationId: searchUsers
      summary: Search users for starting a conversation
      parameters:
        - name: q
          in: query
          required: false
          schema: { type: string }
          description: Search term (name or organization)
      responses:
        "200":
          description: List of matching users with known flag
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSearchResult"

  /conversations:
    get:
      operationId: listConversations
      summary: List conversations for current user
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, name, memberIds]
              properties:
                type:
                  type: string
                  enum: [group, direct]
                name: { type: string }
                memberIds:
                  type: array
                  items: { type: string }
                projectId: { type: string, nullable: true }
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{conversationId}/messages:
    get:
      operationId: listConversationMessages
      summary: Get messages in a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      operationId: sendMessage
      summary: Send a message to a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content: { type: string }
      responses:
        "201":
          description: Sent message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /conversations/{conversationId}/messages/{messageId}:
    delete:
      operationId: deleteMessage
      summary: Delete a message
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string }
        - name: messageId
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

components:
  schemas:
    ApiError:
      type: object
      required: [error]
      properties:
        error: { type: string }

    Conversation:
      type: object
      required: [id, type, name, memberIds, unreadCount, createdAt]
      properties:
        id: { type: string }
        type:
          type: string
          enum: [group, direct]
        name: { type: string }
        avatarUrl: { type: string, nullable: true }
        memberIds:
          type: array
          items: { type: string }
        projectId: { type: string, nullable: true }
        lastMessage: { type: string, nullable: true }
        lastMessageAt: { type: string, nullable: true }
        unreadCount: { type: integer }
        createdAt: { type: string }

    ChatMessage:
      type: object
      required: [id, conversationId, senderId, senderName, content, sentAt, edited]
      properties:
        id: { type: string }
        conversationId: { type: string }
        senderId: { type: string }
        senderName: { type: string }
